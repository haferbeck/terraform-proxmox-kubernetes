name: Bug Report
description: Report a problem with the Proxmox Kubernetes Terraform module
labels: [bug]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: |
        Describe the issue.

        Steps to reproduce:
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: module_version
    attributes:
      label: Module Version
      description: Tag or commit SHA you are using.
      placeholder: v4.0.0
    validations:
      required: true

  - type: input
    id: tofu_version
    attributes:
      label: OpenTofu / Terraform Version
      placeholder: tofu 1.10.0 or terraform 1.13.0
    validations:
      required: true

  - type: input
    id: proxmox_version
    attributes:
      label: Proxmox VE Version
      placeholder: 8.4.0
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Minimal Module Configuration
      description: Smallest possible config that reproduces the issue. Redact secrets.
      value: |-
        ```hcl
        module "kubernetes" {
          # ...
        }
        ```
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Output
      description: tofu / terraform plan and apply errors, logs, or stack traces. Redact secrets.
      render: shell

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmation
      options:
        - label: I have checked existing issues, discussions, and the upstream `terraform-hcloud-kubernetes` module for similar problems.
          required: true
        - label: I have redacted secrets, tokens, and identifying infrastructure details from the configuration and logs above.
          required: true
